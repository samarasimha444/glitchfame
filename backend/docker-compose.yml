services:

  mysql:
    image: mysql:8.0
    container_name: glitchfame-mysql
    restart: always
    env_file:
      - .env
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: glitchfame-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: .        # 🔥 IMPORTANT (NOT ./backend)
    container_name: glitchfame-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "3000:3000"

volumes:
  mysql_data: