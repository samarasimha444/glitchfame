spring.application.name=backend
server.port=3000

# datasource from environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


#redis
spring.data.redis.url=${REDIS_URL}



# hikari pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000



# jpa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration


#cors
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://glitchfame-frontend.vercel.app/,https://glitchfame-frontend.vercel.app/admin/dashboard


#resend
resend.api.key=${RESEND_API_KEY}


# CLOUDINARY 
cloudinary.cloud-name=${Cloudinary_CLOUD_NAME}
cloudinary.api-key=${Cloudinary_API_KEY}
cloudinary.api-secret=${Cloudinary_API_SECRET}





# FILE UPLOAD 
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


#quartz
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=always
spring.quartz.properties.org.quartz.scheduler.instanceName=SeasonScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=5


