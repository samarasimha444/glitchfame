spring.application.name=glitchfame

# Server port
server.port=3000

# ================= DATABASE (MYSQL LOCAL) =================
spring.datasource.url=jdbc:mysql://localhost:3306/glitchfame?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ================= FLYWAY =================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/mysql

# ================= JWT =================
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ================= REDIS =================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis
spring.cache.redis.time-to-live=300000
spring.data.redis.timeout=60000

# ================= FRONTEND =================
app.frontend.url=http://localhost:5173

# ================= SENDGRID =================
sendgrid.api.key=${SENDGRID_API_KEY}
sendgrid.from.email=${SENDGRID_SENDER_MAIL}

# ================= CLOUDINARY =================
cloudinary.cloud-name=${Cloudinary_CLOUD_NAME}
cloudinary.api-key=${Cloudinary_API_KEY}
cloudinary.api-secret=${Cloudinary_API_SECRET}

# ================= FILE UPLOAD =================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ================= MAIL =================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SMTP_USERNAME}
spring.mail.password=${SMTP_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true